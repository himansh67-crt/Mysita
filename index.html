<!DOCTYPE html>
<html>
<head>
<title>Smart Sphere</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
font-family:Arial;
overflow:hidden;
color:white;
}

/* animated background particles */

body::before{
content:"";
position:absolute;
width:300%;
height:300%;
background:radial-gradient(circle,rgba(0,255,255,0.15),transparent 60%);
animation:bgrotate 12s linear infinite;
}

@keyframes bgrotate{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.card{
width:350px;
height:230px;
background:linear-gradient(90deg,#0f6d6d,#e5e5e5);
border-radius:25px;
position:relative;
padding:20px;
overflow:hidden;
transition:0.7s;
box-shadow:0 0 50px rgba(0,255,255,0.4);
}

.card.active{
height:440px;
}

.left{
position:absolute;
top:20px;
left:20px;
color:white;
}

.left h1{
font-size:42px;
margin:0;
}

.right{
position:absolute;
right:20px;
top:20px;
color:#003a3a;
}

/* brain center */

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
cursor:pointer;
}

.center img{
width:90px;
filter:drop-shadow(0 0 25px cyan);
animation:pulse 2s infinite;
transition:0.6s;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.card.active .center img{
transform:scale(1.6) rotate(720deg);
}

/* rotating rings */

.ring{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:170px;
height:170px;
border-radius:50%;
border:4px solid cyan;
box-shadow:0 0 40px cyan;
animation:ringSpin 6s linear infinite;
}

.ring2{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:210px;
height:210px;
border-radius:50%;
border:2px dashed white;
animation:ringSpin2 8s linear infinite;
}

@keyframes ringSpin{
0%{transform:translate(-50%,-50%) rotate(0)}
100%{transform:translate(-50%,-50%) rotate(360deg)}
}

@keyframes ringSpin2{
0%{transform:translate(-50%,-50%) rotate(360deg)}
100%{transform:translate(-50%,-50%) rotate(0)}
}

/* join button */

.join{
margin-top:12px;
padding:10px 18px;
border:none;
background:black;
color:white;
border-radius:12px;
display:none;
}

.card.active .join{
display:inline-block;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

.members{
position:absolute;
right:20px;
bottom:20px;
background:white;
color:#003b3b;
padding:10px;
border-radius:14px;
font-weight:bold;
}

/* extra content */

.extra{
margin-top:220px;
text-align:center;
display:none;
}

.card.active .extra{
display:block;
animation:fade 1s;
}

</style>

</head>

<body>

<div class="card" id="card">

<div class="left">
<p>Smart/</p>
<h1>150+</h1>
<small>active thinkers inside</small>
</div>

<div class="right">
<p>/Sphere</p>
</div>

<div class="ring"></div>
<div class="ring2"></div>

<div class="center" onclick="openCard()">
<img src="https://cdn-icons-png.flaticon.com/512/4139/4139981.png">
<br>
<button class="join">Join the club</button>
</div>

<div class="members">
Limited to <br> 200 members
</div>

<div class="extra">
<h2>Welcome to Smart Sphere 🚀</h2>
<p>Futuristic tech community with AI thinkers.</p>

<

</div>

</div>

<script>

function openCard(){
document.getElementById("card").classList.toggle("active");
}

</script>

</body>
</html>
