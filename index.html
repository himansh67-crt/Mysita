<!DOCTYPE html>
<html>
<head>
<title>My Online Shop</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#2874f0;
color:white;
padding:15px;
font-size:24px;
text-align:center;
}

.search{
text-align:center;
margin:20px;
}

.search input{
padding:10px;
width:200px;
}

.product{
background:white;
width:250px;
margin:20px;
padding:15px;
border-radius:10px;
display:inline-block;
box-shadow:0 0 10px gray;
text-align:center;
}

.product img{
width:200px;
}

button{
background:#fb641b;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
margin:5px;
cursor:pointer;
}

#cart{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
}
</style>

</head>

<body>

<header>My Online Shop</header>

<div class="search">
<input type="text" id="search" placeholder="Search product..." onkeyup="searchProduct()">
</div>

<div id="products">

<div class="product">
<img src="https://m.media-amazon.com/images/I/61L5QgPvgqL._AC_UF1000,1000_QL80_.jpg">
<h3>Smart Phone</h3>
<p>₹5000</p>
<button onclick="addCart('Smart Phone')">Add to Cart</button>
<button onclick="order()">Buy Now</button>
</div>

<div class="product">
<img src="https://m.media-amazon.com/images/I/61CGHv6kmWL._AC_UF1000,1000_QL80_.jpg">
<h3>Headphones</h3>
<p>₹800</p>
<button onclick="addCart('Headphones')">Add to Cart</button>
<button onclick="order()">Buy Now</button>
</div>

</div>

<div id="cart">
<h2>Cart</h2>
<ul id="cartItems"></ul>
</div>

<script>

function order(){
alert("Payment successful! Order placed.");
}

function addCart(item){
let li=document.createElement("li");
li.innerText=item;
document.getElementById("cartItems").appendChild(li);
}

function searchProduct(){
let input=document.getElementById("search").value.toLowerCase();
let products=document.getElementsByClassName("product");

for(let i=0;i<products.length;i++){
let name=products[i].innerText.toLowerCase();
if(name.includes(input)){
products[i].style.display="inline-block";
}else{
products[i].style.display="none";
}
}
}

</script>

</body>
</html>
