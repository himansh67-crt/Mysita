<!DOCTYPE html>
<html>
<head>
<title>My Online Shop</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
text-align:center;
}

header{
background:#2874f0;
color:white;
padding:15px;
font-size:26px;
}

.product{
background:white;
width:250px;
margin:20px;
padding:15px;
border-radius:10px;
display:inline-block;
box-shadow:0 0 10px gray;
}

.product img{
width:200px;
}

button{
background:#fb641b;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<header>My Online Shop</header>

<div class="product">
<img src="https://m.media-amazon.com/images/I/61L5QgPvgqL._AC_UF1000,1000_QL80_.jpg">
<h3>Smart Phone</h3>
<p>Price: ₹5000</p>
<button onclick="order()">Order Now</button>
</div>

<div class="product">
<img src="https://m.media-amazon.com/images/I/61CGHv6kmWL._AC_UF1000,1000_QL80_.jpg">
<h3>Headphones</h3>
<p>Price: ₹800</p>
<button onclick="order()">Order Now</button>
</div>

<script>
function order(){
alert("Your order has been placed!");
}
</script>

</body>
</html>
