<!DOCTYPE html>
<html>
<head>
<title>Modern Shop</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

header{
background:#000;
padding:15px;
font-size:24px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1c1c1c;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px cyan;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
margin:10px;
}

button{
background:#00ffff;
border:none;
padding:8px 15px;
margin-bottom:10px;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<header>My Modern Store</header>

<div class="grid">

<div class="card">
<img src="https://picsum.photos/300?1">
<h3>Smart Phone</h3>
<button>Buy</button>
</div>

<div class="card">
<img src="https://picsum.photos/300?2">
<h3>Headphone</h3>
<button>Buy</button>
</div>

<div class="card">
<img src="https://picsum.photos/300?3">
<h3>Laptop</h3>
<button>Buy</button>
</div>

<div class="card">
<img src="https://picsum.photos/300?4">
<h3>Camera</h3>
<button>Buy</button>
</div>

</div>

</body>
</html>
